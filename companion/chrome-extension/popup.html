<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:320px;min-height:300px;background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:16px}
h2{font-size:15px;text-align:center;margin-bottom:12px;color:#fff}
.status{text-align:center;padding:20px 0}
.loading{width:32px;height:32px;border:3px solid #333;border-top-color:#7c3aed;border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.success{color:#4ade80;font-size:48px}
.error{color:#f87171;font-size:14px;padding:12px;background:rgba(248,113,113,.1);border-radius:8px;margin:8px 0}
#qrcode{display:flex;justify-content:center;padding:8px}
#qrcode canvas{image-rendering:pixelated}
.info{font-size:11px;color:#9ca3af;text-align:center;margin-top:8px}
.btn{display:block;width:100%;padding:10px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.btn:active{transform:scale(.96)}
.btn-primary{background:#7c3aed;color:#fff;margin-bottom:8px}
.btn-secondary{background:#374151;color:#d1d5db}
.account-name{font-size:11px;color:#9ca3af;margin-top:8px;text-align:center}
</style>
</head>
<body>
<h2>微店 Cookie 提取器</h2>
<div id="content"></div>
<script src="popup.js"></script>
</body>
</html>
